<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Simple Password Generator</h1>
        <label for="length">Password Length:</label>
        <input type="number" id="length" min="8" max="32" value="12">
        <div class="criteria">
            <input type="checkbox" id="includeUpper" checked>
            <label for="includeUpper">Include Uppercase</label>
        </div>
        <div class="criteria">
            <input type="checkbox" id="includeLower" checked>
            <label for="includeLower">Include Lowercase</label>
        </div>
        <div class="criteria">
            <input type="checkbox" id="includeNumbers" checked>
            <label for="includeNumbers">Include Numbers</label>
        </div>
        <div class="criteria">
            <input type="checkbox" id="includeSymbols" checked>
            <label for="includeSymbols">Include Symbols</label>
        </div>
        <button id="generateBtn">Generate</button>
        <input type="text" id="passwordOutput" readonly>
        <button id="copyBtn">Copy</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
